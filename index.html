<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BUBBLE POP</title>
</head>
<body>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:#06060f;}
body{display:flex;align-items:flex-start;justify-content:center;}
#gw{width:100%;max-width:480px;min-height:100svh;display:flex;flex-direction:column;align-items:center;padding:16px 16px 24px;background:#06060f;font-family:'Exo 2',sans-serif;position:relative;overflow:hidden;}
#gw::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 10%,rgba(100,60,220,0.12) 0%,transparent 65%);pointer-events:none;}
#ms{position:absolute;inset:0;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(6,6,15,0.97);z-index:20;gap:14px;}
#ms-title{font-family:'Orbitron',monospace;font-size:24px;font-weight:900;color:#fff;letter-spacing:3px;}
#ms-sub{font-size:11px;color:rgba(255,255,255,0.35);letter-spacing:1px;}
.mcard{width:270px;padding:14px 18px;border-radius:12px;cursor:pointer;background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.12);transition:border-color 0.2s,background 0.2s;}
.mcard:hover{background:rgba(255,255,255,0.08);border-color:rgba(180,150,255,0.5);}
.mcard.sel{border-color:rgba(180,150,255,0.9);background:rgba(120,60,220,0.15);}
.mcard-t{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:#fff;margin-bottom:4px;}
.mcard-d{font-size:11px;color:rgba(255,255,255,0.4);line-height:1.6;}
.mtag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;margin-bottom:5px;letter-spacing:1px;}
.tsame{background:rgba(100,60,220,0.3);color:rgba(180,150,255,0.9);}
.tdiff{background:rgba(220,60,60,0.25);color:rgba(255,120,100,0.9);}
.gbtn{padding:11px 38px;border:none;border-radius:8px;background:rgba(100,60,220,0.85);color:#fff;font-family:'Orbitron',monospace;font-size:13px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:background 0.2s,transform 0.1s;}
.gbtn:hover{background:rgba(80,40,200,0.95);}
.gbtn:active{transform:scale(0.96);}
#hud{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:440px;margin-bottom:6px;position:relative;z-index:2;}
.hl{text-align:center;width:100px;flex-shrink:0;}
.hl-label{font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.35);text-transform:uppercase;margin-bottom:2px;}
.hl-val{font-family:'Orbitron',monospace;font-size:20px;font-weight:700;color:#fff;}
.hl-best{font-family:'Orbitron',monospace;font-size:20px;font-weight:700;color:rgba(255,210,0,0.9);}
#trw{position:relative;width:52px;height:52px;flex-shrink:0;}
#tsvg{transform:rotate(-90deg);}
#trbg{stroke:rgba(255,255,255,0.08);}
#tr{stroke:rgba(160,130,255,0.9);stroke-linecap:round;transition:stroke-dashoffset 1s linear,stroke 0.3s;}
#tt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:#fff;}
#pb-wrap{display:flex;align-items:center;gap:6px;width:100%;max-width:440px;margin-bottom:4px;position:relative;z-index:2;justify-content:space-between;}
#pb{font-size:11px;letter-spacing:1px;padding:3px 10px;border-radius:20px;background:rgba(120,60,240,0.2);color:rgba(180,150,255,0.9);border:0.5px solid rgba(120,60,240,0.4);font-family:'Orbitron',monospace;}
#mbadge{font-size:10px;letter-spacing:1px;padding:3px 10px;border-radius:20px;font-family:'Orbitron',monospace;font-weight:700;}
.mb-same{background:rgba(120,60,240,0.2);color:rgba(180,150,255,0.9);border:0.5px solid rgba(120,60,240,0.4);}
.mb-diff{background:rgba(220,60,60,0.18);color:rgba(255,120,100,0.9);border:0.5px solid rgba(220,60,60,0.35);}
#speed-info{font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:1px;min-width:30px;text-align:right;}
#bonus-bar{display:flex;gap:8px;align-items:stretch;justify-content:center;width:100%;max-width:440px;margin-bottom:4px;position:relative;z-index:2;min-height:44px;visibility:hidden;}
#bonus-bar.active{visibility:visible;}
.bchip{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5px 12px;border-radius:10px;font-family:'Orbitron',monospace;transition:opacity 0.3s,border-color 0.3s,background 0.3s;flex:1;gap:2px;}
.bchip-row{display:flex;align-items:baseline;gap:6px;}
.bchip-label{font-size:9px;letter-spacing:1px;color:inherit;opacity:0.7;}
.bchip-pts{font-size:16px;font-weight:700;}
.bchip-count{font-size:9px;opacity:0.6;}
#bc-duo{background:rgba(255,160,0,0.08);border:1px solid rgba(255,160,0,0.2);color:rgba(255,190,60,0.5);}
#bc-duo.lit{border-color:rgba(255,160,0,0.75);color:rgba(255,205,80,1);background:rgba(255,160,0,0.15);}
#bc-duo.cap{border-color:rgba(255,160,0,0.45);color:rgba(255,205,80,0.75);background:rgba(255,160,0,0.1);}
#bc-tri{background:rgba(0,200,150,0.08);border:1px solid rgba(0,200,150,0.2);color:rgba(60,220,170,0.5);}
#bc-tri.lit{border-color:rgba(0,200,150,0.75);color:rgba(80,240,185,1);background:rgba(0,200,150,0.15);}
#bc-tri.cap{border-color:rgba(0,200,150,0.45);color:rgba(80,240,185,0.75);background:rgba(0,200,150,0.1);}
#hist{display:flex;gap:5px;align-items:center;justify-content:center;width:100%;max-width:440px;margin-bottom:5px;position:relative;z-index:2;min-height:36px;}
.hs{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0;transition:transform 0.2s;}
.hs.empty{background:rgba(255,255,255,0.04);border:1.5px dashed rgba(255,255,255,0.1);}
.hs.new{transform:scale(1.15);}
.hdot{width:100%;height:100%;border-radius:50%;position:relative;overflow:hidden;}
.hbadge{position:absolute;top:-4px;right:-4px;font-family:'Orbitron',monospace;font-size:7px;font-weight:700;padding:1px 3px;border-radius:4px;color:#111;z-index:2;line-height:1.4;}
#ci{font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:1px;margin-bottom:5px;height:32px;min-height:32px;text-align:center;position:relative;z-index:2;display:flex;align-items:center;justify-content:center;overflow:hidden;}
#ci span{color:rgba(200,170,255,0.95);font-weight:600;}
#ci .danger{color:rgba(255,100,80,0.95);font-weight:700;}
#grid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(8px,2.5vw,14px);width:min(92vw,420px);position:relative;z-index:2;}
.bw{aspect-ratio:1;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;}
.b-scale-wrap{width:88%;height:88%;display:flex;align-items:center;justify-content:center;position:relative;transform-origin:center center;transition:transform 0.25s ease-out;}
.bo{width:100%;height:100%;border-radius:50%;position:relative;cursor:pointer;animation:flt 3.2s ease-in-out infinite;}
.bw:nth-child(1) .bo{animation-delay:0s;}.bw:nth-child(2) .bo{animation-delay:0.38s;}.bw:nth-child(3) .bo{animation-delay:0.76s;}
.bw:nth-child(4) .bo{animation-delay:1.14s;}.bw:nth-child(5) .bo{animation-delay:1.52s;}.bw:nth-child(6) .bo{animation-delay:1.9s;}
.bw:nth-child(7) .bo{animation-delay:2.28s;}.bw:nth-child(8) .bo{animation-delay:2.66s;}.bw:nth-child(9) .bo{animation-delay:3.04s;}
@keyframes flt{0%{transform:translateY(0) scale(1);}30%{transform:translateY(-5px) scale(1.02);}60%{transform:translateY(-3px) scale(0.99);}100%{transform:translateY(0) scale(1);}}
.bo:active{animation:none!important;transform:scale(0.88)!important;}
@keyframes shakeB{0%,100%{transform:translateX(0);}20%{transform:translateX(-3px);}40%{transform:translateX(3px);}60%{transform:translateX(-2px);}80%{transform:translateX(2px);}}
.bo.shaking{animation:shakeB 0.25s ease-in-out infinite!important;}
.bb{position:absolute;inset:0;border-radius:50%;}
.br{position:absolute;inset:0;border-radius:50%;border:7px solid transparent;}
.bs1{position:absolute;top:9%;left:15%;width:32%;height:25%;border-radius:50%;background:rgba(255,255,255,0.55);filter:blur(3px);pointer-events:none;}
.bs2{position:absolute;bottom:12%;right:14%;width:17%;height:13%;border-radius:50%;background:rgba(255,255,255,0.2);filter:blur(2px);pointer-events:none;}
.timer-ring-svg{position:absolute;inset:0;width:100%;height:100%;border-radius:50%;pointer-events:none;z-index:3;}
.bo.rev{animation:revB 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards!important;}
@keyframes revB{0%{transform:scale(0.08);opacity:0.1;}70%{transform:scale(1.08);opacity:1;}100%{transform:scale(1);opacity:1;}}
.bo.pop{animation:popB 0.22s ease-out forwards!important;}
@keyframes popB{0%{transform:scale(1);opacity:1;}50%{transform:scale(1.3);opacity:0.4;}100%{transform:scale(0.05);opacity:0;}}
.sf{position:absolute;font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:#fff;pointer-events:none;z-index:10;animation:fup 0.85s ease-out forwards;}
@keyframes fup{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-50px) scale(1.1);}}
#bbar{display:flex;align-items:center;justify-content:center;width:100%;max-width:440px;margin-top:10px;position:relative;z-index:2;}
#bnuke{padding:9px 28px;border:none;border-radius:8px;background:rgba(255,60,60,0.15);border:1.5px solid rgba(255,80,80,0.4);color:rgba(255,120,120,0.9);font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:background 0.2s,transform 0.1s;}
#bnuke:hover:not(:disabled){background:rgba(255,60,60,0.28);}
#bnuke:active:not(:disabled){transform:scale(0.96);}
#bnuke:disabled{opacity:0.25;cursor:not-allowed;}
#ov{position:absolute;inset:0;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(6,6,15,0.95);z-index:20;gap:9px;}
#ov-title{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:#fff;letter-spacing:3px;}
#ov-score{font-family:'Orbitron',monospace;font-size:44px;font-weight:700;color:rgba(180,150,255,0.95);}
#ov-best-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;}
#ov-best-label{font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.35);text-transform:uppercase;}
#ov-best{font-family:'Orbitron',monospace;font-size:18px;font-weight:700;color:rgba(255,210,0,0.9);}
#ov-new-best{font-family:'Orbitron',monospace;font-size:13px;color:rgba(255,210,0,0.95);letter-spacing:2px;min-height:18px;}
@keyframes nbAnim{0%{transform:scale(0.5);opacity:0;}100%{transform:scale(1);opacity:1;}}
.nb-show{animation:nbAnim 0.6s ease-out forwards;}
#ov-history{display:flex;flex-direction:column;gap:3px;align-items:center;width:220px;}
.hsr{display:flex;justify-content:space-between;width:100%;font-size:11px;color:rgba(255,255,255,0.35);font-family:'Orbitron',monospace;}
.hsr.latest{color:rgba(255,255,255,0.7);}
#ov-sub{font-size:11px;color:rgba(255,255,255,0.35);letter-spacing:1px;}
.sbtn{padding:7px 20px;border:none;border-radius:6px;background:rgba(255,255,255,0.05);border:0.5px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.45);font-family:'Exo 2',sans-serif;font-size:11px;cursor:pointer;transition:background 0.2s;}
.sbtn:hover{background:rgba(255,255,255,0.1);}
#sc{font-size:10px;color:rgba(180,150,255,0.9);letter-spacing:1px;min-height:14px;}
#lives{display:flex;gap:5px;align-items:center;}
.life{font-size:18px;line-height:1;transition:transform 0.2s,opacity 0.3s;}
.life.lost{opacity:0.15;transform:scale(0.75);}
@keyframes lifeLost{0%{transform:scale(1.4);}100%{transform:scale(0.75);opacity:0.15;}}
.life.losing{animation:lifeLost 0.35s ease-out forwards;}

/* スタート演出オーバーレイ */
#intro-overlay{position:absolute;inset:0;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(6,6,15,0.93);z-index:25;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;}
#intro-bubble-wrap{position:relative;width:min(80vw,340px);height:min(80vw,340px);display:flex;align-items:center;justify-content:center;}
/* イントロバブルのラッパーは親と同サイズ */
#ib-wrap-inner{width:100%;height:100%;position:relative;display:flex;align-items:center;justify-content:center;}
/* 外側グロー */
.ib-glow{position:absolute;inset:-18%;border-radius:50%;background:radial-gradient(circle,rgba(140,80,255,0.38) 0%,rgba(60,30,180,0.18) 50%,transparent 72%);animation:ibGlowPulse 2s ease-in-out infinite;}
@keyframes ibGlowPulse{0%,100%{transform:scale(1);opacity:0.7;}50%{transform:scale(1.08);opacity:1;}}
/* 本体 */
.ib-body{position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle at 38% 30%,rgba(220,200,255,0.32) 0%,rgba(140,80,255,0.20) 35%,rgba(60,20,160,0.22) 70%,rgba(20,10,60,0.28) 100%);
  border:3px solid rgba(200,170,255,0.80);
  box-shadow:0 0 40px 12px rgba(140,80,255,0.55),0 0 80px 24px rgba(100,40,220,0.30),inset 0 0 30px 8px rgba(160,100,255,0.22);}
/* 虹色リム */
.ib-rim{position:absolute;inset:-2px;border-radius:50%;border:2px solid transparent;background:conic-gradient(rgba(255,100,120,0.7),rgba(100,150,255,0.7),rgba(255,220,60,0.7),rgba(80,240,180,0.7),rgba(200,100,255,0.7),rgba(255,100,120,0.7)) border-box;-webkit-mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0);-webkit-mask-composite:destination-out;mask-composite:exclude;animation:ibRimSpin 4s linear infinite;}
@keyframes ibRimSpin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
/* ハイライト */
.ib-shine1{position:absolute;top:9%;left:16%;width:34%;height:26%;border-radius:50%;background:rgba(255,255,255,0.75);filter:blur(6px);pointer-events:none;}
.ib-shine2{position:absolute;bottom:14%;right:14%;width:18%;height:14%;border-radius:50%;background:rgba(255,255,255,0.40);filter:blur(3px);pointer-events:none;}
.ib-shine3{position:absolute;top:50%;left:50%;width:8%;height:8%;border-radius:50%;background:rgba(255,255,255,0.90);filter:blur(2px);transform:translate(-50%,-50%);pointer-events:none;}
/* ラベル */
#intro-label{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;letter-spacing:4px;color:#fff;margin-top:22px;animation:ibPulse 1.2s ease-in-out infinite;text-shadow:0 0 12px rgba(180,140,255,0.9);}
#intro-sublabel{font-family:'Exo 2',sans-serif;font-size:11px;color:rgba(255,255,255,0.4);margin-top:6px;letter-spacing:1px;}
@keyframes ibGlowPulse{0%,100%{transform:scale(1);opacity:0.7;}50%{transform:scale(1.08);opacity:1;}}
@keyframes ibPulse{0%,100%{opacity:0.5;transform:scale(1);}50%{opacity:1;transform:scale(1.04);}}
@keyframes ibFloat{0%,100%{transform:translateY(0);}40%{transform:translateY(-12px);}70%{transform:translateY(-7px);}}
@keyframes ibReveal{0%{opacity:0;transform:scale(0.4);}60%{transform:scale(1.06);}100%{opacity:1;transform:scale(1);}}
@keyframes ibPop{0%{transform:scale(1);opacity:1;}35%{transform:scale(1.4);opacity:0.7;}100%{transform:scale(0.04);opacity:0;}}
.ib-reveal{animation:ibReveal 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;}
.ib-floating{animation:ibFloat 3s ease-in-out infinite;}
.ib-popping{animation:ibPop 0.3s ease-out forwards!important;}
</style>

<div id="gw">
  <div id="ms">
    <div id="ms-title">BUBBLE POP</div>
    <div id="ms-sub">モードを選んでスタート</div>
    <div class="mcard sel" id="card-same">
      <div class="mtag tsame">SAME COLOR</div>
      <div class="mcard-t">同色連鎖モード</div>
      <div class="mcard-d">同じ色を連続して壊すほど得点加速。20秒間で高スコアを狙え。バブルは時間切れで自動更新。全破壊1回使用可。</div>
    </div>
    <div class="mcard" id="card-diff">
      <div class="mtag tdiff">DIFF COLOR</div>
      <div class="mcard-t">異色連鎖モード</div>
      <div class="mcard-d">同色2連続でゲームオーバー。2COLOR(過去5色)と3COLOR(直近3色)のボーナスを狙え。連鎖で加速。</div>
    </div>
    <button class="gbtn" id="btn-go">START</button>
  </div>

  <div id="ov" style="display:none;">
    <div id="ov-title">RESULT</div>
    <div id="ov-score">0</div>
    <div id="ov-best-wrap"><div id="ov-best-label">best</div><div id="ov-best">0</div></div>
    <div id="ov-new-best"></div>
    <div id="ov-history"></div>
    <div id="ov-sub"></div>
    <button class="gbtn" id="btn-retry" style="margin-top:4px;font-size:12px;padding:10px 32px;">RETRY</button>
    <button class="sbtn" id="btn-back">モード選択へ</button>
    <button class="sbtn" id="btn-share">結果をコピー</button>
    <div id="sc"></div>
  </div>

  <div id="hud">
    <div class="hl"><div class="hl-label">best</div><div class="hl-best" id="bd">0</div></div>
    <div id="trw">
      <svg id="tsvg" width="52" height="52" viewBox="0 0 52 52">
        <circle id="trbg" cx="26" cy="26" r="22" fill="none" stroke-width="3.5"/>
        <circle id="tr" cx="26" cy="26" r="22" fill="none" stroke-width="3.5" stroke-dasharray="138.2" stroke-dashoffset="0"/>
      </svg>
      <div id="tt">20</div>
    </div>
    <div class="hl"><div class="hl-label">score</div><div class="hl-val" id="sd">0</div></div>
  </div>

  <div id="pb-wrap">
    <div id="mbadge" class="mb-same">SAME</div>
    <div id="pb">×1</div>
    <div id="lives" style="display:none;">
      <span class="life" id="life0">❤️</span>
      <span class="life" id="life1">❤️</span>
      <span class="life" id="life2">❤️</span>
    </div>
    <div id="speed-info"></div>
  </div>

  <div id="bonus-bar">
    <div class="bchip" id="bc-duo">
      <div class="bchip-label">2COLOR</div>
      <div class="bchip-row"><div class="bchip-pts" id="bc-duo-pts">200pt</div><div class="bchip-count" id="bc-duo-ct">0/5</div></div>
    </div>
    <div class="bchip" id="bc-tri">
      <div class="bchip-label">3COLOR</div>
      <div class="bchip-row"><div class="bchip-pts" id="bc-tri-pts">300pt</div><div class="bchip-count" id="bc-tri-ct">0/5</div></div>
    </div>
  </div>

  <div id="hist"></div>
  <div id="ci">　</div>
  <div id="grid"></div>
  <div id="bbar"><button id="bnuke">NUKE (x1)</button></div>

  <!-- スタート演出オーバーレイ -->
  <div id="intro-overlay" style="display:none;">
    <div id="intro-bubble-wrap">
      <div class="ib-floating" id="ib-wrap-inner">
        <div class="ib-glow"></div>
        <div class="ib-body"></div>
        <div class="ib-rim"></div>
        <div class="ib-shine1"></div>
        <div class="ib-shine2"></div>
        <div class="ib-shine3"></div>
      </div>
    </div>
    <div id="intro-label">TAP TO START</div>
    <div id="intro-sublabel">バブルをタップしてスタート</div>
  </div>
</div>

<script>
(function(){
  var COLORS=[
    {name:'red',   solid:'#ff4455',body:'rgba(255,50,70,0.18)', rimSolid:'rgba(255,80,90,0.92)',glow:'rgba(255,50,70,0.55)'},
    {name:'blue',  solid:'#22aaff',body:'rgba(30,150,255,0.18)',rimSolid:'rgba(60,170,255,0.92)',glow:'rgba(30,140,255,0.55)'},
    {name:'yellow',solid:'#ffdd00',body:'rgba(255,210,0,0.18)', rimSolid:'rgba(255,225,30,0.92)',glow:'rgba(255,200,0,0.55)'},
  ];
  var MIX={
    'red+blue':'rgba(160,50,230,0.18)','blue+red':'rgba(160,50,230,0.18)',
    'red+yellow':'rgba(255,110,0,0.18)','yellow+red':'rgba(255,110,0,0.18)',
    'blue+yellow':'rgba(0,200,90,0.18)','yellow+blue':'rgba(0,200,90,0.18)',
  };

  var cells=[],score=0;
  var best={same:0,diff:0},scoreHistory={same:[],diff:[]};
  var combo=0,timeLeft=20,phase=1;
  var timerInt=null,running=false,lastColor=null,history=[];
  var nukeUsed=false,gameMode='same',elapsedSec=0;
  var lives=3; // 異色モード残基
  var bubbleTimers=[],diffLoopInt=null,sameLoopInt=null;
  // 同色モード: 初期6秒、60秒ごとに1秒短縮、最短2秒
  var SAME_BASE=6000, SAME_MIN=2000, SAME_ACCEL=60;
  var sameCurrentTime=SAME_BASE, sameElapsed=0;
  // 異色モード: 初期20秒、90秒ごとに1秒短縮、最短6秒
  var DIFF_BASE=20000, DIFF_MIN=6000, DIFF_ACCEL=90;
  var currentBubbleTime=DIFF_BASE;

  var CAP=5;
  var duoCount=0,triCount=0;
  var diffTimeBonus=0; // 異色モード: 20秒ごとに累積加算するボーナス量
  function duoPts(n){return Math.min(n,CAP)*300;}
  function triPts(n){return Math.min(n,CAP)*300;}

  // 3COLORボーナス判定：colorLog（最新が先頭）に赤青黄が揃ったあと、
  // さらに1色破壊（連鎖1）で発動。つまり赤青黄+任意1色の4色ウィンドウで判定。
  // colorLogは最大5件保持。直近4件に3色すべて含まれ、かつ直近1件が「3色以外ではない」
  // → 直近4件に赤青黄がすべて揃った瞬間に発動（4件目追加時）
  function checkTriBonus(){
    if(colorLog.length<4)return false;
    var w=colorLog.slice(0,4); // 直近4色
    return w.indexOf('red')>=0&&w.indexOf('blue')>=0&&w.indexOf('yellow')>=0;
  }
  var colorLog=[];

  var CHAIN_PTS=[0,100,150,250,400,600,900];
  function getChainPts(c){return CHAIN_PTS[Math.min(c,6)];}

  var sd=document.getElementById('sd'),bd=document.getElementById('bd');
  var tt=document.getElementById('tt'),tr=document.getElementById('tr');
  var ci=document.getElementById('ci'),hist=document.getElementById('hist');
  var ms=document.getElementById('ms'),ov=document.getElementById('ov');
  var ovScore=document.getElementById('ov-score'),ovBest=document.getElementById('ov-best');
  var ovNewBest=document.getElementById('ov-new-best'),ovHistory=document.getElementById('ov-history');
  var ovSub=document.getElementById('ov-sub'),pb=document.getElementById('pb');
  var mbadge=document.getElementById('mbadge'),bnuke=document.getElementById('bnuke');
  var grid=document.getElementById('grid'),speedInfo=document.getElementById('speed-info');
  var bonusBar=document.getElementById('bonus-bar');
  var bcDuo=document.getElementById('bc-duo'),bcTri=document.getElementById('bc-tri');
  var bcDuoPts=document.getElementById('bc-duo-pts'),bcTriPts=document.getElementById('bc-tri-pts');
  var bcDuoCt=document.getElementById('bc-duo-ct'),bcTriCt=document.getElementById('bc-tri-ct');

  function randC(){return COLORS[Math.floor(Math.random()*COLORS.length)];}
  function getBody(f,bk){var k=f.name+'+'+bk.name;return MIX[k]||f.body;}
  function applyStyle(o,f,bk){
    o.querySelector('.bb').style.background=getBody(f,bk);
    var r=o.querySelector('.br');
    r.style.borderColor=f.rimSolid;
    r.style.boxShadow='0 0 16px 4px '+f.glow+', inset 0 0 10px 2px '+f.glow;
  }
  function makeOuter(f,bk){
    var o=document.createElement('div');o.className='bo';
    var ns='http://www.w3.org/2000/svg';
    var svg=document.createElementNS(ns,'svg');
    svg.setAttribute('class','timer-ring-svg');svg.setAttribute('viewBox','0 0 100 100');
    var bg=document.createElementNS(ns,'circle');
    bg.setAttribute('cx','50');bg.setAttribute('cy','50');bg.setAttribute('r','46');
    bg.setAttribute('fill','none');bg.setAttribute('stroke','rgba(255,255,255,0.12)');bg.setAttribute('stroke-width','3');
    var fg=document.createElementNS(ns,'circle');
    fg.setAttribute('cx','50');fg.setAttribute('cy','50');fg.setAttribute('r','46');
    fg.setAttribute('fill','none');fg.setAttribute('stroke','rgba(255,255,255,0.92)');fg.setAttribute('stroke-width','5');
    fg.setAttribute('stroke-linecap','round');
    fg.setAttribute('stroke-dasharray',CIRC_B.toFixed(1));
    fg.setAttribute('stroke-dashoffset','0');fg.setAttribute('transform','rotate(-90 50 50)');
    fg.setAttribute('class','btr');
    svg.appendChild(bg);svg.appendChild(fg);
    o.innerHTML='<div class="bb"></div><div class="br"></div><div class="bs1"></div><div class="bs2"></div>';
    o.appendChild(svg);applyStyle(o,f,bk);return o;
  }
  function setTimerRing(outer,progress){
    var ring=outer.querySelector('.btr');if(!ring)return;
    ring.setAttribute('stroke-dashoffset',(CIRC_B*(1-progress)).toFixed(2));
    if(progress<0.25){ring.setAttribute('stroke-width','7');ring.setAttribute('stroke','rgba(255,255,255,1)');}
    else{ring.setAttribute('stroke-width','5');ring.setAttribute('stroke','rgba(255,255,255,0.92)');}
  }
  function setBubbleScale(sw,progress){
    sw.style.transform='scale('+(1+(1-progress)*0.28).toFixed(3)+')';
  }

  function calcBonus(colorName){
    colorLog.unshift(colorName);
    if(colorLog.length>5)colorLog.pop();
    var bonusPts=0,bonusType=null;
    // 2COLORボーナス：過去5色が2色のみ
    if(colorLog.length>=5){
      var s5={};for(var i=0;i<5;i++)s5[colorLog[i]]=1;
      if(Object.keys(s5).length===2){
        duoCount++;bonusPts+=duoPts(duoCount);bonusType='duo';
      }
    }
    // 3COLORボーナス：直近4色に赤・青・黄がすべて含まれる（4色目追加時に発動）
    if(checkTriBonus()){
      triCount++;bonusPts+=triPts(triCount);bonusType=bonusType?'both':'tri';
    }
    updateBonusUI();
    return {pts:bonusPts,type:bonusType};
  }
  function updateBonusUI(){
    var dNext=duoPts(duoCount+1),tNext=triPts(triCount+1);
    var dCap=duoCount>=CAP,tCap=triCount>=CAP;
    bcDuoPts.textContent=(dCap?duoPts(CAP):dNext)+'pt';
    bcTriPts.textContent=(tCap?triPts(CAP):tNext)+'pt';
    bcDuoCt.textContent=duoCount+'/'+CAP;
    bcTriCt.textContent=triCount+'/'+CAP;
    bcDuo.className='bchip'+(dCap?' cap':duoCount>0?' lit':'');
    bcTri.className='bchip'+(tCap?' cap':triCount>0?' lit':'');
  }

  function buildGrid(){
    grid.innerHTML='';cells=[];bubbleTimers=[];
    for(var i=0;i<9;i++){
      var f=randC(),bk=randC();
      var w=document.createElement('div');w.className='bw';
      var sw=document.createElement('div');sw.className='b-scale-wrap';
      var o=makeOuter(f,bk);
      sw.appendChild(o);w.appendChild(sw);grid.appendChild(w);
      cells.push({wrap:w,scaleWrap:sw,outer:o,front:f,back:bk,popping:false});
      bubbleTimers.push(null);
      (function(idx){
        w.addEventListener('click',function(){popBubble(idx);});
        w.addEventListener('touchstart',function(e){e.preventDefault();popBubble(idx);},{passive:false});
      })(i);
    }
  }

  function getBubbleDuration(){
    return gameMode==='same'?sameCurrentTime:currentBubbleTime;
  }

  function startOneBubbleTimer(idx){
    if(bubbleTimers[idx])clearInterval(bubbleTimers[idx]);
    var cell=cells[idx];if(!cell||cell.popping)return;
    var duration=getBubbleDuration(),start=Date.now();
    setTimerRing(cell.outer,1);setBubbleScale(cell.scaleWrap,1);
    bubbleTimers[idx]=(function(i,dur){
      return setInterval(function(){
        if(!running){clearInterval(bubbleTimers[i]);return;}
        var progress=Math.max(0,1-(Date.now()-start)/dur);
        var c=cells[i];if(!c||c.popping)return;
        setTimerRing(c.outer,progress);setBubbleScale(c.scaleWrap,progress);
        if(progress<0.25)c.outer.classList.add('shaking');
        else c.outer.classList.remove('shaking');
        if(progress<=0){
          clearInterval(bubbleTimers[i]);
          if(running&&!c.popping){
            if(gameMode==='same'){
              autoRefresh(i);
            } else {
              burstAndGameOver(i);
            }
          }
        }
      },50);
    })(idx,duration);
  }

  // 同色モード: 自動更新（連鎖・lastColor変えない）＋ペナルティ-1000pt
  function autoRefresh(idx){
    var cell=cells[idx];if(!cell)return;
    // ペナルティ
    score=Math.max(0,score-1000);sd.textContent=score;
    spawnFloat(cell,'-1000','rgba(255,80,80,0.95)');
    cell.popping=true;
    cell.outer.classList.remove('shaking');
    cell.scaleWrap.style.transform='scale(1)';
    cell.outer.classList.add('pop');
    setTimeout(function(){
      var prevBack=cell.back;cell.front=prevBack;cell.back=randC();
      cell.popping=false;cell.outer.classList.remove('pop');
      applyStyle(cell.outer,cell.front,cell.back);
      setTimerRing(cell.outer,1);setBubbleScale(cell.scaleWrap,1);
      void cell.outer.offsetWidth;cell.outer.classList.add('rev');
      setTimeout(function(){cell.outer.classList.remove('rev');},380);
      if(running)startOneBubbleTimer(idx);
    },220);
  }

  function clearAllBubbleTimers(){
    for(var i=0;i<bubbleTimers.length;i++){if(bubbleTimers[i])clearInterval(bubbleTimers[i]);bubbleTimers[i]=null;}
  }
  function resetAllBubbleTimers(){
    for(var i=0;i<9;i++){var c=cells[i];if(!c||c.popping)continue;startOneBubbleTimer(i);}
  }
  function burstAndGameOver(idx){
    var cell=cells[idx];
    // 赤フラッシュ
    var fl=document.createElement('div');
    fl.style.cssText='position:absolute;inset:0;border-radius:16px;background:rgba(255,40,40,0.18);z-index:15;pointer-events:none;animation:fRed 0.4s ease-out forwards;';
    if(!document.getElementById('fRedSt')){var st=document.createElement('style');st.id='fRedSt';st.textContent='@keyframes fRed{0%{opacity:1;}100%{opacity:0;}}';document.head.appendChild(st);}
    document.getElementById('gw').appendChild(fl);
    setTimeout(function(){if(fl.parentNode)fl.parentNode.removeChild(fl);},400);

    // 残基消費
    lives--;
    var lostEl=document.getElementById('life'+(lives));
    if(lostEl){lostEl.className='life losing';setTimeout(function(){lostEl.className='life lost';lostEl.textContent='🖤';},350);}

    if(lives<=0){
      // 残基0 → ゲームオーバー
      if(cell){cell.popping=true;cell.outer.classList.remove('shaking');cell.outer.classList.add('pop');}
      running=false;clearAllBubbleTimers();clearInterval(diffLoopInt);
      ci.innerHTML='<span class="danger">GAME OVER</span>';
      setTimeout(endGame,500);
    } else {
      // 残機あり → バブル破裂して新しいバブルに差し替え、タイマー再開
      ci.innerHTML='<span class="danger">TIME OUT — '+lives+' left</span>';
      setTimeout(function(){if(running)ci.innerHTML='　';},1000);
      if(cell){
        cell.popping=true;cell.outer.classList.remove('shaking');cell.outer.classList.add('pop');
        setTimeout(function(){
          var prevBack=cell.back;cell.front=prevBack;cell.back=randC();
          cell.popping=false;cell.outer.classList.remove('pop');
          applyStyle(cell.outer,cell.front,cell.back);
          setTimerRing(cell.outer,1);setBubbleScale(cell.scaleWrap,1);
          void cell.outer.offsetWidth;cell.outer.classList.add('rev');
          setTimeout(function(){cell.outer.classList.remove('rev');},380);
          if(running)startOneBubbleTimer(idx);
        },240);
      }
    }
  }

  function buildHist(){
    hist.innerHTML='';
    for(var i=0;i<6;i++){var s=document.createElement('div');s.className='hs empty';s.id='hs'+i;hist.appendChild(s);}
  }
  function renderHist(){
    for(var i=0;i<6;i++){
      var slot=document.getElementById('hs'+i);if(!slot)continue;
      if(i>=history.length){slot.className='hs empty';slot.innerHTML='';continue;}
      var h=history[i];
      var c=COLORS.filter(function(x){return x.name===h.colorName;})[0];
      slot.className='hs'+(i===0?' new':'');
      var badge='';
      if(h.bonusType==='both') badge='<div class="hbadge" style="background:rgba(255,205,80,0.95);">DT</div>';
      else if(h.bonusType==='duo') badge='<div class="hbadge" style="background:rgba(255,205,80,0.95);">2C</div>';
      else if(h.bonusType==='tri') badge='<div class="hbadge" style="background:rgba(80,240,185,0.95);">3C</div>';
      var op=Math.max(0.3,1-i*0.1);
      slot.innerHTML='<div class="hdot" style="background:'+(c?c.solid:'#888')+';opacity:'+op+';"><div style="position:absolute;top:6%;left:12%;width:30%;height:24%;border-radius:50%;background:rgba(255,255,255,0.5);filter:blur(2px);"></div></div>'+badge;
    }
  }
  function pushHist(colorName,bonusType){
    history.unshift({colorName:colorName,bonusType:bonusType});
    if(history.length>6)history.pop();
    renderHist();
  }
  function spawnFloat(cell,text,color){
    var fl=document.createElement('div');fl.className='sf';fl.textContent=text;
    if(color)fl.style.color=color;
    var r=cell.wrap.getBoundingClientRect();
    var wr=document.getElementById('gw').getBoundingClientRect();
    fl.style.left=(r.left-wr.left+r.width/2-16)+'px';
    fl.style.top=(r.top-wr.top)+'px';
    document.getElementById('gw').appendChild(fl);
    setTimeout(function(){if(fl.parentNode)fl.parentNode.removeChild(fl);},900);
  }

  function popBubble(idx){
    if(!running)return;
    var cell=cells[idx];if(!cell||cell.popping)return;
    var colorName=cell.front.name;

    if(gameMode==='diff'&&lastColor!==null&&colorName===lastColor){
      // 残基を1消費
      lives--;
      var lostEl=document.getElementById('life'+(lives));
      if(lostEl){lostEl.className='life losing';setTimeout(function(){lostEl.className='life lost';lostEl.textContent='🖤';},350);}
      // 赤フラッシュ
      var fl2=document.createElement('div');
      fl2.style.cssText='position:absolute;inset:0;border-radius:16px;background:rgba(255,40,40,0.18);z-index:15;pointer-events:none;animation:fRed 0.4s ease-out forwards;';
      if(!document.getElementById('fRedSt')){var st2=document.createElement('style');st2.id='fRedSt';st2.textContent='@keyframes fRed{0%{opacity:1;}100%{opacity:0;}}';document.head.appendChild(st2);}
      document.getElementById('gw').appendChild(fl2);
      setTimeout(function(){if(fl2.parentNode)fl2.parentNode.removeChild(fl2);},400);
      if(lives<=0){
        // 残基0 → ゲームオーバー
        running=false;clearAllBubbleTimers();clearInterval(diffLoopInt);
        ci.innerHTML='<span class="danger">GAME OVER</span>';
        setTimeout(endGame,500);
      } else {
        // 残機あり → lastColorリセットして継続
        ci.innerHTML='<span class="danger">MISS — '+lives+' left</span>';
        lastColor=null;
        setTimeout(function(){if(running)ci.innerHTML='　';},1000);
      }
      return;
    }

    cell.popping=true;
    clearInterval(bubbleTimers[idx]);bubbleTimers[idx]=null;

    var pts=0,bonusResult={pts:0,type:null};
    if(gameMode==='same'){
      if(lastColor===null)combo=1;
      else if(colorName===lastColor)combo=Math.min(combo+1,6);
      else combo=1;
      pts=getChainPts(combo)*phase;
    } else {
      bonusResult=calcBonus(colorName);
      var diffBase=100+diffTimeBonus;
      pts=bonusResult.pts>0?bonusResult.pts:diffBase;
    }

    lastColor=colorName;
    score+=pts;sd.textContent=score;
    pushHist(colorName,bonusResult.type);

    if(gameMode==='same'){
      if(combo>=6)ci.innerHTML='<span>'+combo+'連鎖 MAX</span> 900pt';
      else if(combo>=4)ci.innerHTML='<span>'+combo+'連鎖</span> '+getChainPts(combo)+'pt';
      else if(combo>=2)ci.innerHTML='<span>'+combo+'連鎖</span> あと'+(6-combo)+'でMAX';
      else ci.innerHTML='　';
    } else {
      var ciText='';
      if(bonusResult.type==='duo'||bonusResult.type==='both') ciText+='<span style="color:rgba(255,205,80,1);">2COLOR +'+duoPts(duoCount)+'</span> ';
      if(bonusResult.type==='tri'||bonusResult.type==='both') ciText+='<span style="color:rgba(80,240,185,1);">3COLOR +'+triPts(triCount)+'</span>';
      ci.innerHTML=ciText||'　';
    }

    var floatColor=null;
    if(bonusResult.type==='both')floatColor='rgba(255,240,120,0.95)';
    else if(bonusResult.type==='tri')floatColor='rgba(80,240,185,0.95)';
    else if(bonusResult.type==='duo')floatColor='rgba(255,205,80,0.95)';
    spawnFloat(cell,'+'+pts,floatColor);

    cell.outer.classList.remove('shaking');
    cell.scaleWrap.style.transform='scale(1)';
    cell.outer.classList.add('pop');

    setTimeout(function(){
      var prevBack=cell.back;cell.front=prevBack;cell.back=randC();
      cell.popping=false;cell.outer.classList.remove('pop');
      applyStyle(cell.outer,cell.front,cell.back);
      setTimerRing(cell.outer,1);setBubbleScale(cell.scaleWrap,1);
      void cell.outer.offsetWidth;cell.outer.classList.add('rev');
      setTimeout(function(){cell.outer.classList.remove('rev');},380);
      if(running)startOneBubbleTimer(idx);
    },240);
  }

  function doNuke(){
    if(!running||nukeUsed)return;
    nukeUsed=true;bnuke.disabled=true;
    score+=900;sd.textContent=score;
    if(gameMode==='same'){
      cells.forEach(function(cell,i){
        if(cell.popping)return;cell.popping=true;
        clearInterval(bubbleTimers[i]);bubbleTimers[i]=null;
        setTimeout(function(){
          cell.outer.classList.add('pop');
          spawnFloat(cell,'+100','rgba(255,200,80,0.9)');
          setTimeout(function(){
            var pb=cell.back;cell.front=pb;cell.back=randC();
            cell.popping=false;cell.outer.classList.remove('pop');
            applyStyle(cell.outer,cell.front,cell.back);
            setTimerRing(cell.outer,1);setBubbleScale(cell.scaleWrap,1);
            void cell.outer.offsetWidth;cell.outer.classList.add('rev');
            setTimeout(function(){cell.outer.classList.remove('rev');},380);
            if(running)startOneBubbleTimer(i);
          },240);
        },i*45);
      });
    } else {
      resetAllBubbleTimers();
      spawnFloat(cells[4],'+900','rgba(255,200,80,0.95)');
      var fl=document.createElement('div');
      fl.style.cssText='position:absolute;inset:0;border-radius:16px;background:rgba(255,200,0,0.1);z-index:15;pointer-events:none;animation:fGold 0.5s ease-out forwards;';
      if(!document.getElementById('fGoldSt')){var st=document.createElement('style');st.id='fGoldSt';st.textContent='@keyframes fGold{0%{opacity:1;}100%{opacity:0;}}';document.head.appendChild(st);}
      document.getElementById('gw').appendChild(fl);
      setTimeout(function(){if(fl.parentNode)fl.parentNode.removeChild(fl);},500);
      ci.innerHTML='<span style="color:rgba(255,200,80,0.95);">NUKE — TIMER RESET +900pt</span>';
    }
  }

  // イントロ演出
  var introOverlay=document.getElementById('intro-overlay');
  var ibWrapInner=document.getElementById('ib-wrap-inner');
  var IB_CIRC=2*Math.PI*46;
  var introTimerInt=null;

  function showIntro(){
    introOverlay.style.display='flex';
    ibWrapInner.style.animation='';
    // クラスを一旦外してからrAFでrevealアニメ付与
    ibWrapInner.className='';
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        ibWrapInner.className='ib-reveal';
        setTimeout(function(){ibWrapInner.className='ib-floating';},520);
      });
    });

  function popIntroAndStart(){
    clearInterval(introTimerInt);
    ibWrapInner.className='ib-popping';
    setTimeout(function(){
      introOverlay.style.display='none';
      ibWrapInner.className='';

    },320);

  introOverlay.addEventListener('click',popIntroAndStart);
  introOverlay.addEventListener('touchstart',function(e){e.preventDefault();popIntroAndStart();},{passive:false});

  function startGame(){
    ms.style.display='none';ov.style.display='none';
    // グリッドとHUDを事前構築しておく
    score=0;combo=0;timeLeft=20;phase=1;lastColor=null;history=[];
    nukeUsed=false;elapsedSec=0;lives=3;
    currentBubbleTime=DIFF_BASE;sameCurrentTime=SAME_BASE;sameElapsed=0;
    duoCount=0;triCount=0;colorLog=[];diffTimeBonus=0;
    sd.textContent='0';bd.textContent=best[gameMode];
    tr.style.strokeDashoffset='0';tr.style.stroke='rgba(160,130,255,0.9)';
    pb.textContent='×1';ci.innerHTML='　';speedInfo.textContent='';
    bnuke.disabled=false;
    // ライフUI初期化
    var livesEl=document.getElementById('lives');
    for(var li=0;li<3;li++){var l=document.getElementById('life'+li);l.className='life';l.textContent='❤️';}
    clearInterval(timerInt);clearInterval(diffLoopInt);clearInterval(sameLoopInt);clearAllBubbleTimers();
    if(gameMode==='same'){
      mbadge.textContent='SAME';mbadge.className='mb-same';
      tt.textContent='20';bonusBar.classList.remove('active');

      livesEl.style.display='none';
    } else {
      mbadge.textContent='DIFF';mbadge.className='mb-diff';
      tt.textContent='0';tt.style.color='#fff';tt.style.transform='';tt.style.transition='';
      tr.style.strokeDashoffset=CIRC_HUD+'';
      bonusBar.classList.add('active');speedInfo.textContent=(DIFF_BASE/1000)+'s';
      bnuke.textContent='NUKE — RESET (x1)';
      livesEl.style.display='flex';
      updateBonusUI();
    }
    buildGrid();buildHist();
    showIntro();
  }

  function actualStartGame(){
    running=true;
    for(var i=0;i<9;i++)startOneBubbleTimer(i);
    if(gameMode==='same'){
      timerInt=setInterval(function(){
        timeLeft--;tt.textContent=timeLeft;
        tr.style.strokeDashoffset=CIRC_HUD*(1-timeLeft/20);
        if(timeLeft/20<0.25)tr.style.stroke='rgba(255,80,80,0.9)';
        else if(timeLeft/20<0.5)tr.style.stroke='rgba(255,160,40,0.9)';
        if(timeLeft===10){phase=2;pb.textContent='×2';phasePulse();}
        if(timeLeft===5){phase=3;pb.textContent='×3';phasePulse();}
        if(timeLeft<=0){clearInterval(timerInt);clearInterval(sameLoopInt);clearAllBubbleTimers();running=false;endGame();}
      },1000);
      sameLoopInt=setInterval(function(){
        if(!running)return;
        sameElapsed++;
        if(sameElapsed%SAME_ACCEL===0){
          var nt=Math.max(SAME_MIN,sameCurrentTime-1000);
          if(nt!==sameCurrentTime){sameCurrentTime=nt;speedInfo.textContent=(nt/1000)+'s';}
        }
      },1000);
    } else {
      diffLoopInt=setInterval(function(){
        if(!running)return;
        elapsedSec++;
        tt.textContent=elapsedSec;
        // 20秒で1周
        tr.style.strokeDashoffset=CIRC_HUD*(1-(elapsedSec%20)/20);
        tr.style.stroke='rgba(220,80,60,0.9)';
        // 20秒ごと：基礎ポイント+20累積 ＋ タイマー特殊演出
        if(elapsedSec%20===0){
          diffTimeBonus+=20;
          // タイマーリングをフラッシュ
          tr.style.stroke='rgba(255,210,80,1)';
          tr.style.strokeDashoffset='0';
          setTimeout(function(){
            tr.style.stroke='rgba(220,80,60,0.9)';
          },500);
          // HUDタイマー数字を一瞬強調
          tt.style.color='rgba(255,210,80,1)';tt.style.transform='scale(1.4)';tt.style.transition='transform 0.2s,color 0.2s';
          setTimeout(function(){tt.style.color='#fff';tt.style.transform='scale(1)';},500);
          // ci表示
          ci.innerHTML='<span style="color:rgba(255,210,80,1);">BASE +'+(100+diffTimeBonus)+'pt</span>';
          setTimeout(function(){if(gameMode==='diff'&&running)ci.innerHTML='　';},1500);
        }
        if(elapsedSec%DIFF_ACCEL===0){
          var nt=Math.max(DIFF_MIN,currentBubbleTime-1000);
          if(nt!==currentBubbleTime){currentBubbleTime=nt;speedInfo.textContent=(nt/1000)+'s';}
        }
      },1000);
    }
  }

  function phasePulse(){
    pb.style.background='rgba(160,130,255,0.45)';
    setTimeout(function(){pb.style.background='rgba(120,60,240,0.2)';},400);
  }

  function endGame(){
    clearInterval(timerInt);clearInterval(diffLoopInt);clearInterval(sameLoopInt);
    clearAllBubbleTimers();running=false;
    var isNew=score>best[gameMode];
    if(isNew)best[gameMode]=score;
    bd.textContent=best[gameMode];
    scoreHistory[gameMode].push(score);
    // ベスト5を降順で保持
    scoreHistory[gameMode].sort(function(a,b){return b-a;});
    if(scoreHistory[gameMode].length>5)scoreHistory[gameMode]=scoreHistory[gameMode].slice(0,5);
    ovScore.textContent=score;ovBest.textContent=best[gameMode];
    ovNewBest.textContent=isNew?'NEW BEST':'';
    ovNewBest.className=isNew?'nb-show':'';
    var sl=scoreHistory[gameMode],histHTML='';
    for(var i=0;i<sl.length;i++){
      var isBest=(i===0);
      var isCurrent=(sl[i]===score&&!histHTML.includes('current-mark'));
      histHTML+='<div class="hsr'+(isBest?' latest':'')+'"><span>#'+(i+1)+'</span><span>'+(isBest?'★ ':'')+sl[i]+'pt</span></div>';
    }
    ovHistory.innerHTML=histHTML;
    var ml=gameMode==='same'?'SAME':'DIFF';
    var ex=gameMode==='diff'?' '+elapsedSec+'s (2C:'+duoCount+' 3C:'+triCount+')':'';
    ovSub.textContent='['+ml+']'+ex;
    ov.style.display='flex';
  }

  document.getElementById('card-same').addEventListener('click',function(){gameMode='same';document.getElementById('card-same').classList.add('sel');document.getElementById('card-diff').classList.remove('sel');});
  document.getElementById('card-diff').addEventListener('click',function(){gameMode='diff';document.getElementById('card-diff').classList.add('sel');document.getElementById('card-same').classList.remove('sel');});
  document.getElementById('btn-go').addEventListener('click',startGame);
  document.getElementById('btn-go').addEventListener('touchstart',function(e){e.preventDefault();startGame();},{passive:false});
  document.getElementById('btn-retry').addEventListener('click',startGame);
  document.getElementById('btn-retry').addEventListener('touchstart',function(e){e.preventDefault();startGame();},{passive:false});
  document.getElementById('btn-back').addEventListener('click',function(){
    clearInterval(timerInt);clearInterval(diffLoopInt);clearInterval(sameLoopInt);clearAllBubbleTimers();
    clearInterval(introTimerInt);introOverlay.style.display='none';
    running=false;ov.style.display='none';ms.style.display='flex';
  });
  bnuke.addEventListener('click',doNuke);
  bnuke.addEventListener('touchstart',function(e){e.preventDefault();doNuke();},{passive:false});
  document.getElementById('btn-share').addEventListener('click',function(){
    var ml=gameMode==='same'?'SAME':'DIFF';
    var ex=gameMode==='diff'?' ('+elapsedSec+'s)':'';
    var text='BUBBLE POP ['+ml+'] '+score+'pt'+ex+' / BEST:'+best[gameMode]+'pt';
    if(navigator.clipboard)navigator.clipboard.writeText(text).then(function(){
      document.getElementById('sc').textContent='Copied!';
      setTimeout(function(){document.getElementById('sc').textContent='';},2000);
    });
  });
  buildHist();
})();
</script>
</body>
</html>
